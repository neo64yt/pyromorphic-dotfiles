[colors]
background = #000000
foreground = #ffffff
primary = #12846e
ws-bg-active = #272a34
alert = #A54242
volume = #1075e8
bat-charge = #2a9c5f
bat-norm = #0fbdd1
bat-low = #ed0c1f
cpu = #ede20c
ram = #a718db
date = #c77810


[bar/main]
width = 100%
height = 50px

dpi = 192

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 4px

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = JetBrains Mono:size=11
font-1 = Material Design Icons:size=11;1

modules-left = xworkspaces xwindow
modules-right = volume battery cpu memory date ewwtray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

icon-0 = one;¾░ŗ£
icon-1 = two;¾░║Č
icon-2 = three;¾░åŹ
icon-3 = four;¾░åī
icon-4 = five;¾░Éŗ
icon-5 = six;¾░Āö

label-active = %icon%
label-active-background = ${colors.ws-bg-active}
label-active-foreground = ${colors.primary}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %icon%
label-occupied-foreground= ${colors.foreground}
label-occupied-underline= ${colors.foreground}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = 
label-empty-padding = 0

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%


[module/volume]
type = custom/script
exec = /usr/local/bin/wp_vol
tail = true
label-foreground = ${colors.volume}
label = %output%
click-left = volumectl mute
scroll-down = volumectl up 
scroll-up = volumectl down

[module/memory]
type = internal/memory
interval = 2
format-prefix = "¾░Źø "
format-prefix-foreground = ${colors.ram}
label-foreground = ${colors.ram}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "¾░śÜ "
format-prefix-foreground = ${colors.cpu}
label-foreground = ${colors.cpu}
label = %percentage:2%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1

format-charging-foreground = ${colors.bat-charge}
format-discharging-foreground = ${colors.bat-norm}
format-low-foreground = ${colors.bat-low}
format-full-foreground = ${colors.bat-norm}

format-charging = <animation-charging><label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-low = <ramp-capacity><animation-low> <label-low>  
format-full = <ramp-capacity> <label-full>
label-charging = ¾░ēü %percentage%%
label-discharging = %percentage%%
label-low = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ¾░éÄ 
ramp-capacity-1 = ¾░ü╝ 
ramp-capacity-2 = ¾░üŠ 
ramp-capacity-3 = ¾░éĆ 
ramp-capacity-4 = ¾░ü╣

animation-charging-framerate = 750

animation-charging-0 = ¾░éÄ 
animation-charging-1 = ¾░ü╝ 
animation-charging-2 = ¾░üŠ 
animation-charging-3 = ¾░éĆ 
animation-charging-4 = ¾░ü╣

animation-low-0 = ¾▒łĖ
animation-low-1 = 
animation-low-framerate = 200

[module/date]
type = internal/date
interval = 1

date = ¾░ģÉ %H:%M
date-alt = ¾░ĖŚ %a, %d/%m

label = %date%
label-foreground = ${colors.date}

[module/ewwtray]
type = custom/text

label = ¾▒©ć
click-left = eww open tray --toggle
padding-right = 0

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
